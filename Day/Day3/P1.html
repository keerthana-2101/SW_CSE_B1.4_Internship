<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>
<body>
    <p>HTML tables</p>
    <p>tr = Table row
        td = table data 
        th = table header
    </p>

    <table border="1">
        <caption> Monthly Savings </caption>
        <tr>
            <th>Month</th>
            <th> Savings</th>
        </tr>
        <tr>
            <td>January</td>
            <td>50000</td>
        </tr>
        <tr>
            <td>February</td>
            <td>30000</td>
        </tr>
    </table>
<!-- another way to write tables-->
 
    <table border = "1">
        <caption>Sales Data</caption>
        <thead>
            <tr>
                <th>Month</th>
                <th>Sales</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>January</td>
                <td>50000</td>
            </tr>
            <tr>
                <td>February</td>
                <td>30000</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total</td>
                <td>80000</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
