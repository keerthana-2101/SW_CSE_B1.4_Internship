<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag: Span row/column</title>
</head>
<body>
    <table Border="1">
        <tr>
            <th colspan="2"><!--it creates 1 cell instead of two-->
                Student Details
            </th>
        </tr>
        <tr>
            <td>Name</td>
            <td>Keerthana</td>
        </tr>
        <tr>
            <td>Course</td>
            <td>Computer Science</td>
        </tr>
    </table>
</body>
</html>
