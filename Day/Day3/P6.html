<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Audio Tag</title>
</head>
<body>
    <audio src="sample-3s.mp3" controls>Your browser does not support the audio tag</audio>

    <!-- Audio formats
    1. Mp3
    2. OGG
    3. WAV    
    -->
    
    <!--AutoPlay-->
    <audio src="sample-3s.mp3" autoplay controls>
        Your browser does not support the audio tag</audio>
    <!-- muted autoplay -->
    <audio src="sample-3s.mp3" autoplay muted controls>
        Your browser does not support the audio tag</audio>
    <!-- loop -->
    <audio src="sample-3s.mp3" loop controls>
        Your browser does not support the audio tag</audio>
    <!-- preload="none" -->
    <audio src="sample-3s.mp3" preload="none" controls>
        Your browser does not support the audio tag</audio>
</body>
</html>
