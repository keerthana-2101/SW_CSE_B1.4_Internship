<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Tag</title>
</head>
<body>
    <p>Video Tag</p>
    <!-- Video format: mp4/webM/ogg -->
    <video src="sample-5s-360p.mp4" controls>
        Your browser does not support the video tag
    </video>

    <video src="sample-5s-360p.webm">
        Your browser does not support the video tag
    </video>
    <!-- W/O controls the video appears but doesn't play. JavaScript can start playing video. -->
    <!-- Width and Height -->
    <video src="sample-5s-360p.mp4" controls width="880" height="530">
        Your browser does not support the video tag
    </video>
</body>
</html>
