<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- hyperlink tags -->

    <!-- External URL -->
    <a href="https://www.google.com">open google</a>

    <!-- Internal or Relative URL -->
    <a href="P2.html">Open P2</a>
    <h1>Section 1</h1>
    <p>This is a paragraph in section 1.</p>
    <h1>Section 2</h1>
    <p>This is a paragraph in section 2.</p>
    <a href="#Section1">Take me to section 1</a>
    <a href="#Section2">Take me to section 2</a>

    <!-- Email URL -->
    <a href="mailto:gudurukeerthanareddy21@gmail.com">E mail me</a>

    <!-- Attributes of a tag -->

    <!-- default. same tab -->
    <a href="https://www.google.com" target="_self">open google in same tab </a>
    <!-- new tab -->
    <a href="https://www.google.com" target="_blank">open google in new tab </a>
    <!-- parent tab -->
    <a href="https://www.google.com" target="_parent">open google in parent tab </a>
    <!-- topmost tab or full document -->
    <a href="https://www.google.com" target="_top">open google in topmost tab </a>

</body>
</html>
